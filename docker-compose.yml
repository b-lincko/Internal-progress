# CMMC Tracker - Docker Compose (HTTP Only)
# Simple, works out of the box. No SSL certificate issues.

services:
  db:
    image: postgres:16-alpine
    container_name: cmmc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cmmc
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme-strong-password}
      POSTGRES_DB: cmmc2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmmc -d cmmc2"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cmmc-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cmmc-tracker:latest
    container_name: cmmc-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://cmmc:${DB_PASSWORD:-changeme-strong-password}@db:5432/cmmc2
      JWT_SECRET: ${JWT_SECRET:-changeme-jwt-secret-key-min-32-chars}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cmmc-network

volumes:
  postgres_data:
  uploads:

networks:
  cmmc-network:
    driver: bridge
