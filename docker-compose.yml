# CMMC Tracker - Docker Compose
# Full production deployment with PostgreSQL + Next.js HTTPS
# Works on both local machines and remote servers

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: cmmc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cmmc
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme-strong-password}
      POSTGRES_DB: cmmc2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port 5432 is already used by system PostgreSQL
    # Only expose to Docker network (not host) to avoid conflict
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmmc -d cmmc2"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cmmc-network

  # CMMC Tracker App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cmmc-tracker:latest
    container_name: cmmc-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://cmmc:${DB_PASSWORD:-changeme-strong-password}@db:5432/cmmc2
      JWT_SECRET: ${JWT_SECRET:-changeme-jwt-secret-key-min-32-chars}
      PORT: 3000
      HTTP_PORT: 3001
      NODE_ENV: production
    ports:
      - "3000:3000"  # HTTPS
      - "3001:3001"  # HTTP redirect
    volumes:
      # Persist uploads outside container
      - uploads:/app/public/uploads
      # Optional: mount custom SSL certs
      - ${SSL_CERT_PATH:-./certs}:/app/certs:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cmmc-network
    # Healthcheck for the app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "https://localhost:3000/api/auth/me", "||", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx Reverse Proxy (for domain-based deployment)
  # Uncomment this section if you want to use nginx with a real domain
  # nginx:
  #   image: nginx:alpine
  #   container_name: cmmc-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - cmmc-network

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local

networks:
  cmmc-network:
    driver: bridge
