# CMMC Tracker - Docker Compose with HTTPS
# Includes self-signed SSL certificates

version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cmmc-db
    environment:
      POSTGRES_USER: cmmc
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme-strong-password}
      POSTGRES_DB: cmmc2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmmc -d cmmc2"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    image: cmmc-tracker:latest
    container_name: cmmc-app
    environment:
      DATABASE_URL: postgresql://cmmc:${DB_PASSWORD:-changeme-strong-password}@db:5432/cmmc2
      JWT_SECRET: ${JWT_SECRET:-changeme-jwt-secret-key-min-32-chars}
      PORT: 3000
      HTTP_PORT: 3001
      NODE_ENV: production
    ports:
      - "3000:3000"  # HTTPS
      - "3001:3001"  # HTTP (redirects to HTTPS)
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
